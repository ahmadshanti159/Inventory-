<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f2f2f7">
    <title>نظام إدارة المخزون - الرفوف الذكية</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --text2: #6d6d72;
            --text3: #8e8e93;
            --accent: #0071e3;
            --accent2: #e8f2ff;
            --danger: #ff3b30;
            --danger2: #ffeaea;
            --success: #34c759;
            --success2: #e8f8ed;
            --warning: #ff9500;
            --warning2: #fff5e6;
            --border: #e5e5ea;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
            --header-h: 52px;
            --breadcrumb-h: 38px;
            --fab-size: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-overflow-scrolling: touch;
            padding-top: calc(var(--header-h) + var(--safe-top) + var(--breadcrumb-h));
            padding-bottom: calc(var(--fab-size) + 32px + var(--safe-bottom));
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(242, 242, 247, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding-top: var(--safe-top);
            border-bottom: 0.5px solid var(--border);
        }
        .header-inner {
            height: var(--header-h);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
        }
        .header .btn-back {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .header .btn-back:active {
            transform: scale(0.92);
            background: #e8e8ed;
        }
        .header .btn-back.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-12px);
        }
        .header .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .header .btn-search, .header .btn-settings {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            color: var(--text2);
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            transition: var(--transition);
        }
        .header .btn-settings.hidden {
            display: none;
        }
        .header .btn-search:active, .header .btn-settings:active {
            transform: scale(0.92);
            background: #e8e8ed;
        }

        .breadcrumb {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-top));
            left: 0;
            right: 0;
            z-index: 99;
            background: var(--bg);
            height: var(--breadcrumb-h);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 4px;
            font-size: 13px;
            color: var(--text3);
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            border-bottom: 0.5px solid transparent;
        }
        .breadcrumb span {
            flex-shrink: 0;
            color: var(--text3);
        }
        .breadcrumb .sep {
            margin: 0 2px;
            font-size: 11px;
        }
        .breadcrumb .crumb-active {
            color: var(--accent);
            font-weight: 600;
        }

        .main-content {
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 200px;
        }

        .stats-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .stat-chip {
            flex: 1;
            min-width: 70px;
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-chip .stat-val {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            line-height: 1;
        }
        .stat-chip .stat-lbl {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
            font-weight: 500;
        }
        .stat-chip.accent {
            background: var(--accent2);
        }
        .stat-chip.accent .stat-val {
            color: var(--accent);
        }
        .stat-chip.warning-chip {
            background: var(--warning2);
        }
        .stat-chip.warning-chip .stat-val {
            color: var(--warning);
        }
        .stat-chip.danger-chip {
            background: var(--danger2);
        }
        .stat-chip.danger-chip .stat-val {
            color: var(--danger);
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 15px 14px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            animation: fadeInUp 0.35s ease both;
        }
        .card:active {
            transform: scale(0.975);
            background: #f9f9fb;
            border-color: #e0e0e5;
        }
        .card .icon-box {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .card .icon-box.shelf-icon {
            background: #e8f2ff;
        }
        .card .icon-box.subshelf-icon {
            background: #f0e6f6;
        }
        .card .icon-box.product-icon {
            background: #e8f8ed;
        }
        .card .info {
            flex: 1;
            min-width: 0;
        }
        .card .info .name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            letter-spacing: -0.2px;
            line-height: 1.2;
        }
        .card .info .meta {
            font-size: 12px;
            color: var(--text3);
            margin-top: 2px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .card .info .meta span {
            background: #f5f5f7;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 11px;
        }
        .card .badge {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 20px;
            flex-shrink: 0;
            letter-spacing: -0.1px;
        }
        .badge-stock-good {
            background: var(--success2);
            color: var(--success);
        }
        .badge-stock-low {
            background: var(--warning2);
            color: var(--warning);
        }
        .badge-stock-out {
            background: var(--danger2);
            color: var(--danger);
        }
        .card .arrow-left {
            font-size: 14px;
            color: #c7c7cc;
            flex-shrink: 0;
        }
        .card .btn-delete {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #f5f5f7;
            color: #c7c7cc;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .card .btn-delete:active {
            background: var(--danger2);
            color: var(--danger);
            transform: scale(0.9);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInUp 0.5s ease;
        }
        .empty-state .emoji {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }
        .empty-state .msg {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .empty-state .sub {
            font-size: 13px;
            color: var(--text3);
            line-height: 1.5;
        }

        .fab {
            position: fixed;
            bottom: calc(24px + var(--safe-bottom));
            right: 20px;
            width: var(--fab-size);
            height: var(--fab-size);
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.35);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .fab:active {
            transform: scale(0.9);
            box-shadow: 0 3px 12px rgba(0, 113, 227, 0.25);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-sheet {
            background: #ffffff;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px 20px calc(20px + var(--safe-bottom));
            box-shadow: var(--shadow-lg);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }
        .modal-sheet .modal-handle {
            width: 36px;
            height: 5px;
            background: #d1d1d6;
            border-radius: 3px;
            margin: 0 auto 16px;
        }
        .modal-sheet h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
            text-align: center;
            color: var(--text);
        }
        .modal-sheet .form-group {
            margin-bottom: 14px;
        }
        .modal-sheet label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 5px;
            letter-spacing: -0.1px;
        }
        .modal-sheet input {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-xs);
            border: 1.5px solid var(--border);
            font-size: 16px;
            font-family: var(--font);
            background: #f9f9fb;
            transition: var(--transition);
            color: var(--text);
            -webkit-appearance: none;
        }
        .modal-sheet input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        .modal-sheet .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .modal-sheet .btn {
            flex: 1;
            padding: 13px;
            border-radius: var(--radius-xs);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            letter-spacing: -0.2px;
            transition: var(--transition);
        }
        .modal-sheet .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .modal-sheet .btn-primary:active {
            background: #005bbf;
            transform: scale(0.97);
        }
        .modal-sheet .btn-cancel {
            background: #f5f5f7;
            color: var(--text2);
        }
        .modal-sheet .btn-cancel:active {
            background: #e5e5ea;
            transform: scale(0.97);
        }
        .modal-sheet .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .modal-sheet .btn-danger:active {
            background: #d63029;
            transform: scale(0.97);
        }

        .search-bar-wrap {
            padding: 4px 16px 8px;
            position: relative;
        }
        .search-bar-wrap input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            font-size: 15px;
            font-family: var(--font);
            background: #f9f9fb;
            transition: var(--transition);
            -webkit-appearance: none;
            color: var(--text);
        }
        .search-bar-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.08);
        }
        .search-bar-wrap .search-icon {
            position: absolute;
            left: 26px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: #c7c7cc;
            pointer-events: none;
        }
        .search-bar-wrap.hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: calc(var(--fab-size) + 40px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1c1c1e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            z-index: 300;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: -0.1px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .confirm-overlay {
            position: fixed;
            inset: 0;
            z-index: 250;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }
        .confirm-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .confirm-dialog {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }
        .confirm-overlay.active .confirm-dialog {
            transform: scale(1);
        }
        .confirm-dialog .confirm-emoji {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .confirm-dialog p {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }
        .confirm-dialog .sub {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 16px;
        }
        .confirm-dialog .btn-row {
            display: flex;
            gap: 8px;
        }
        .confirm-dialog .btn {
            flex: 1;
            padding: 11px;
            border-radius: var(--radius-xs);
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: var(--transition);
        }
        .confirm-dialog .btn-del {
            background: var(--danger);
            color: #fff;
        }
        .confirm-dialog .btn-del:active {
            background: #c62828;
            transform: scale(0.95);
        }
        .confirm-dialog .btn-cancel {
            background: #f5f5f7;
            color: var(--text2);
        }
        .confirm-dialog .btn-cancel:active {
            background: #e5e5ea;
            transform: scale(0.95);
        }

        @media (min-width: 500px) {
            .main-content {
                max-width: 480px;
                margin: 0 auto;
                padding: 12px 8px;
            }
            .stats-row {
                max-width: 480px;
                margin: 0 auto 2px;
                padding: 0 8px;
            }
            .search-bar-wrap {
                max-width: 480px;
                margin: 0 auto;
                padding: 4px 8px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <div class="header-inner">
            <button class="btn-back hidden" id="btnBack" title="رجوع">‹</button>
            <span class="title" id="headerTitle">📦 مخزوني</span>
            <button class="btn-settings hidden" id="btnSettings" title="إدارة ربط السيريال">⚙️</button>
            <button class="btn-search" id="btnSearch" title="بحث">🔍</button>
        </div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <span>🏠</span><span class="sep">›</span><span class="crumb-active">الرئيسية</span>
    </div>

    <div class="search-bar-wrap hidden" id="searchWrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="بحث عن منتج، رف، أو نوع...">
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="main-content" id="mainContent"></div>
    <button class="fab" id="fab" title="إضافة">+</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-handle"></div>
            <h3 id="modalTitle">إضافة</h3>
            <div id="modalBody"></div>
            <div class="btn-row" id="modalBtns"></div>
        </div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <span class="confirm-emoji">⚠️</span>
            <p id="confirmMsg">هل أنت متأكد من الحذف؟</p>
            <p class="sub" id="confirmSub">لا يمكن التراجع عن هذا الإجراء</p>
            <div class="btn-row">
                <button class="btn btn-cancel" id="confirmCancel">إلغاء</button>
                <button class="btn btn-del" id="confirmOk">حذف</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'shelves_inventory_data_v3';
            const MAPPINGS_KEY = 'serial_type_mappings_v1';

            // --- Data functions ---
            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (Array.isArray(data)) return data;
                    }
                } catch (e) {}
                return [];
            }
            function saveData(shelves) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(shelves));
            }
            function loadMappings() {
                try {
                    const raw = localStorage.getItem(MAPPINGS_KEY);
                    if (raw) {
                        const arr = JSON.parse(raw);
                        if (Array.isArray(arr)) return arr;
                    }
                } catch (e) {}
                return [];
            }
            function saveMappings(mappings) {
                localStorage.setItem(MAPPINGS_KEY, JSON.stringify(mappings));
            }

            function generateId() {
                return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            }

            let shelves = loadData();
            let serialMappings = loadMappings();

            let navStack = [];
            let currentView = 'home';
            let currentShelfId = null;
            let currentSubShelfId = null;
            let searchQuery = '';
            let confirmCallback = null;

            function getCurrentShelf() {
                return shelves.find(s => s.id === currentShelfId) || null;
            }
            function getCurrentSubShelf() {
                const shelf = getCurrentShelf();
                if (!shelf) return null;
                return (shelf.subShelves || []).find(ss => ss.id === currentSubShelfId) || null;
            }

            const $headerTitle = document.getElementById('headerTitle');
            const $btnBack = document.getElementById('btnBack');
            const $btnSearch = document.getElementById('btnSearch');
            const $btnSettings = document.getElementById('btnSettings');
            const $breadcrumb = document.getElementById('breadcrumb');
            const $searchWrap = document.getElementById('searchWrap');
            const $searchInput = document.getElementById('searchInput');
            const $statsRow = document.getElementById('statsRow');
            const $mainContent = document.getElementById('mainContent');
            const $fab = document.getElementById('fab');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $modalSheet = document.getElementById('modalSheet');
            const $modalTitle = document.getElementById('modalTitle');
            const $modalBody = document.getElementById('modalBody');
            const $modalBtns = document.getElementById('modalBtns');
            const $confirmOverlay = document.getElementById('confirmOverlay');
            const $confirmMsg = document.getElementById('confirmMsg');
            const $confirmSub = document.getElementById('confirmSub');
            const $confirmOk = document.getElementById('confirmOk');
            const $confirmCancel = document.getElementById('confirmCancel');
            const $toast = document.getElementById('toast');

            let toastTimer = null;
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                $toast.textContent = msg;
                $toast.classList.add('show');
                toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
            }

            // --- Navigation ---
            function navigateTo(target, shelfId = null, subShelfId = null, shelfName = '', subShelfName = '') {
                if (target === 'home') {
                    currentView = 'home';
                    currentShelfId = null;
                    currentSubShelfId = null;
                    navStack = [];
                    $btnBack.classList.add('hidden');
                    $btnSettings.classList.remove('hidden');
                    $headerTitle.textContent = '📦 مخزوني';
                    $breadcrumb.innerHTML = '<span>🏠</span><span class="sep">›</span><span class="crumb-active">الرئيسية</span>';
                    $searchWrap.classList.add('hidden');
                    $searchInput.value = '';
                    searchQuery = '';
                } else if (target === 'shelf') {
                    currentView = 'shelf';
                    currentShelfId = shelfId;
                    currentSubShelfId = null;
                    navStack = [{ type: 'shelf', id: shelfId, name: shelfName }];
                    $btnBack.classList.remove('hidden');
                    $btnSettings.classList.add('hidden');
                    $headerTitle.textContent = shelfName || 'الرف';
                    $breadcrumb.innerHTML = '<span>🏠</span><span class="sep">›</span><span class="crumb-active">' + (shelfName || 'الرف') + '</span>';
                    $searchWrap.classList.remove('hidden');
                    $searchInput.value = '';
                    searchQuery = '';
                } else if (target === 'subshelf') {
                    currentView = 'subshelf';
                    currentShelfId = shelfId;
                    currentSubShelfId = subShelfId;
                    navStack = [
                        { type: 'shelf', id: shelfId, name: shelfName },
                        { type: 'subshelf', id: subShelfId, name: subShelfName, parentId: shelfId }
                    ];
                    $btnBack.classList.remove('hidden');
                    $btnSettings.classList.add('hidden');
                    $headerTitle.textContent = subShelfName || 'الرف الفرعي';
                    $breadcrumb.innerHTML = '<span>🏠</span><span class="sep">›</span><span>' + (shelfName || 'الرف') + '</span><span class="sep">›</span><span class="crumb-active">' + (subShelfName || 'الرف الفرعي') + '</span>';
                    $searchWrap.classList.remove('hidden');
                    $searchInput.value = '';
                    searchQuery = '';
                }
                updateFabLabel();
                renderAll();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function goBack() {
                if (currentView === 'subshelf') {
                    const shelf = getCurrentShelf();
                    navigateTo('shelf', currentShelfId, null, shelf ? shelf.name : '');
                } else if (currentView === 'shelf') {
                    navigateTo('home');
                }
            }

            function updateFabLabel() {
                if (currentView === 'home') $fab.textContent = '+';
                else if (currentView === 'shelf') $fab.textContent = '+';
                else $fab.textContent = '+';
            }

            // --- Stats ---
            function getTotalStats() {
                let totalShelves = shelves.length;
                let totalSubShelves = 0;
                let totalProducts = 0;
                let totalStock = 0;
                let lowStockCount = 0;
                let outOfStockCount = 0;
                shelves.forEach(s => {
                    const subs = s.subShelves || [];
                    totalSubShelves += subs.length;
                    const directProds = s.products || [];
                    directProds.forEach(p => {
                        totalProducts++;
                        totalStock += (p.stock || 0);
                        if ((p.stock || 0) === 0) outOfStockCount++;
                        else if ((p.stock || 0) <= 5) lowStockCount++;
                    });
                    subs.forEach(ss => {
                        const prods = ss.products || [];
                        prods.forEach(p => {
                            totalProducts++;
                            totalStock += (p.stock || 0);
                            if ((p.stock || 0) === 0) outOfStockCount++;
                            else if ((p.stock || 0) <= 5) lowStockCount++;
                        });
                    });
                });
                return { totalShelves, totalSubShelves, totalProducts, totalStock, lowStockCount, outOfStockCount };
            }

            function renderStats() {
                const stats = getTotalStats();
                if (currentView === 'home') {
                    $statsRow.innerHTML = `
                <div class="stat-chip accent"><div class="stat-val">${stats.totalShelves}</div><div class="stat-lbl">رف رئيسي</div></div>
                <div class="stat-chip"><div class="stat-val">${stats.totalSubShelves}</div><div class="stat-lbl">رف فرعي</div></div>
                <div class="stat-chip"><div class="stat-val">${stats.totalProducts}</div><div class="stat-lbl">منتج</div></div>
                <div class="stat-chip"><div class="stat-val">${stats.totalStock}</div><div class="stat-lbl">إجمالي المخزون</div></div>
                ${stats.lowStockCount > 0 ? `<div class="stat-chip warning-chip"><div class="stat-val">${stats.lowStockCount}</div><div class="stat-lbl">مخزون منخفض</div></div>` : ''}
                ${stats.outOfStockCount > 0 ? `<div class="stat-chip danger-chip"><div class="stat-val">${stats.outOfStockCount}</div><div class="stat-lbl">نفذ المخزون</div></div>` : ''}`;
                } else if (currentView === 'shelf') {
                    const shelf = getCurrentShelf();
                    const subsCount = (shelf && shelf.subShelves) ? shelf.subShelves.length : 0;
                    const directProds = (shelf && shelf.products) ? shelf.products : [];
                    let totalP = directProds.length;
                    let totalS = directProds.reduce((sum, p) => sum + (p.stock || 0), 0);
                    if (shelf && shelf.subShelves) {
                        shelf.subShelves.forEach(ss => {
                            const prods = ss.products || [];
                            totalP += prods.length;
                            totalS += prods.reduce((sum, p) => sum + (p.stock || 0), 0);
                        });
                    }
                    $statsRow.innerHTML = `
                <div class="stat-chip accent"><div class="stat-val">${subsCount}</div><div class="stat-lbl">رف فرعي</div></div>
                <div class="stat-chip"><div class="stat-val">${totalP}</div><div class="stat-lbl">منتج</div></div>
                <div class="stat-chip"><div class="stat-val">${totalS}</div><div class="stat-lbl">إجمالي المخزون</div></div>`;
                } else if (currentView === 'subshelf') {
                    const subshelf = getCurrentSubShelf();
                    const prods = (subshelf && subshelf.products) ? subshelf.products : [];
                    const totalS = prods.reduce((sum, p) => sum + (p.stock || 0), 0);
                    const lowC = prods.filter(p => (p.stock || 0) > 0 && (p.stock || 0) <= 5).length;
                    const outC = prods.filter(p => (p.stock || 0) === 0).length;
                    $statsRow.innerHTML = `
                <div class="stat-chip accent"><div class="stat-val">${prods.length}</div><div class="stat-lbl">منتج</div></div>
                <div class="stat-chip"><div class="stat-val">${totalS}</div><div class="stat-lbl">إجمالي المخزون</div></div>
                ${lowC > 0 ? `<div class="stat-chip warning-chip"><div class="stat-val">${lowC}</div><div class="stat-lbl">مخزون منخفض</div></div>` : ''}
                ${outC > 0 ? `<div class="stat-chip danger-chip"><div class="stat-val">${outC}</div><div class="stat-lbl">نفذ المخزون</div></div>` : ''}`;
                }
            }

            // --- Render content ---
            function renderContent() {
                $mainContent.innerHTML = '';
                const q = searchQuery.toLowerCase().trim();
                if (currentView === 'home') {
                    let filtered = shelves;
                    if (q) filtered = shelves.filter(s => s.name.toLowerCase().includes(q));
                    if (filtered.length === 0) {
                        $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">🏪</span><div class="msg">${q ? 'لا توجد نتائج' : 'لا توجد رفوف بعد'}</div><div class="sub">${q ? 'جرّب كلمة بحث مختلفة' : 'اضغط على + لإضافة أول رف رئيسي'}</div></div>`;
                    } else {
                        filtered.forEach((s, i) => {
                            const subsCount = (s.subShelves || []).length;
                            let totalProds = (s.products || []).length;
                            (s.subShelves || []).forEach(ss => { totalProds += (ss.products || []).length; });
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.style.animationDelay = (i * 0.04) + 's';
                            card.innerHTML = `
                        <div class="icon-box shelf-icon">📦</div>
                        <div class="info"><div class="name">${escapeHtml(s.name)}</div><div class="meta"><span>📂 ${subsCount} رف فرعي</span><span>📦 ${totalProds} منتج</span></div></div>
                        <button class="btn-delete" data-action="delete-shelf" data-id="${s.id}">🗑️</button>
                        <span class="arrow-left">›</span>`;
                            card.addEventListener('click', function(e) {
                                if (e.target.closest('[data-action="delete-shelf"]')) return;
                                navigateTo('shelf', s.id, null, s.name);
                            });
                            $mainContent.appendChild(card);
                        });
                    }
                } else if (currentView === 'shelf') {
                    const shelf = getCurrentShelf();
                    if (!shelf) { navigateTo('home'); return; }
                    let subShelves = shelf.subShelves || [];
                    let directProducts = shelf.products || [];
                    if (q) {
                        subShelves = subShelves.filter(ss => ss.name.toLowerCase().includes(q));
                        directProducts = directProducts.filter(p => p.name.toLowerCase().includes(q) || p.serial.toLowerCase().includes(q) || p.type.toLowerCase().includes(q));
                    }
                    if (subShelves.length === 0 && directProducts.length === 0) {
                        $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">📭</span><div class="msg">${q ? 'لا توجد نتائج' : 'الرف فارغ'}</div><div class="sub">${q ? 'جرّب كلمة بحث مختلفة' : 'أضف رفوف فرعية أو منتجات'}</div></div>`;
                    } else {
                        if (subShelves.length > 0) {
                            const h = document.createElement('div');
                            h.style.cssText = 'font-size:13px;font-weight:700;color:#8e8e93;padding:4px 4px 2px;';
                            h.textContent = '📂 الرفوف الفرعية';
                            $mainContent.appendChild(h);
                            subShelves.forEach((ss, i) => {
                                const prodsCount = (ss.products || []).length;
                                const card = document.createElement('div');
                                card.className = 'card';
                                card.style.animationDelay = (i * 0.04) + 's';
                                card.innerHTML = `
                            <div class="icon-box subshelf-icon">📁</div>
                            <div class="info"><div class="name">${escapeHtml(ss.name)}</div><div class="meta"><span>📦 ${prodsCount} منتج</span></div></div>
                            <button class="btn-delete" data-action="delete-subshelf" data-id="${ss.id}">🗑️</button>
                            <span class="arrow-left">›</span>`;
                                card.addEventListener('click', function(e) {
                                    if (e.target.closest('[data-action="delete-subshelf"]')) return;
                                    navigateTo('subshelf', shelf.id, ss.id, shelf.name, ss.name);
                                });
                                $mainContent.appendChild(card);
                            });
                        }
                        if (directProducts.length > 0) {
                            const h2 = document.createElement('div');
                            h2.style.cssText = 'font-size:13px;font-weight:700;color:#8e8e93;padding:8px 4px 2px;margin-top:6px;';
                            h2.textContent = '📦 منتجات مباشرة';
                            $mainContent.appendChild(h2);
                            directProducts.forEach((p, i) => $mainContent.appendChild(createProductCard(p, shelf, null, i)));
                        }
                    }
                } else if (currentView === 'subshelf') {
                    const subshelf = getCurrentSubShelf();
                    if (!subshelf) { const shelf = getCurrentShelf(); navigateTo('shelf', currentShelfId, null, shelf ? shelf.name : ''); return; }
                    let products = subshelf.products || [];
                    if (q) products = products.filter(p => p.name.toLowerCase().includes(q) || p.serial.toLowerCase().includes(q) || p.type.toLowerCase().includes(q));
                    if (products.length === 0) {
                        $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">📦</span><div class="msg">${q ? 'لا توجد نتائج' : 'لا توجد منتجات'}</div><div class="sub">${q ? 'جرّب كلمة بحث مختلفة' : 'اضغط + للإضافة'}</div></div>`;
                    } else {
                        products.forEach((p, i) => $mainContent.appendChild(createProductCard(p, null, subshelf, i)));
                    }
                }
                attachDeleteListeners();
            }

            function createProductCard(p, shelf, subshelf, index) {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.04) + 's';
                let stockBadgeClass = 'badge-stock-good', stockLabel = 'متوفر';
                if ((p.stock || 0) === 0) { stockBadgeClass = 'badge-stock-out'; stockLabel = 'نفذ'; }
                else if ((p.stock || 0) <= 5) { stockBadgeClass = 'badge-stock-low'; stockLabel = 'منخفض'; }
                card.innerHTML = `
            <div class="icon-box product-icon">🏷️</div>
            <div class="info"><div class="name">${escapeHtml(p.name)}</div><div class="meta"><span>🔢 ${escapeHtml(p.serial)}</span><span>📂 ${escapeHtml(p.type)}</span></div></div>
            <span class="badge ${stockBadgeClass}">${stockLabel}: ${p.stock || 0}</span>
            <button class="btn-delete" data-action="delete-product" data-id="${p.id}" data-parent="${subshelf ? subshelf.id : (shelf ? shelf.id : '')}" data-parent-type="${subshelf ? 'subshelf' : 'shelf'}">🗑️</button>`;
                card.addEventListener('click', function(e) {
                    if (e.target.closest('[data-action="delete-product"]')) return;
                    openEditProductModal(p, subshelf, shelf);
                });
                return card;
            }

            function attachDeleteListeners() {
                document.querySelectorAll('[data-action="delete-shelf"]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        const shelf = shelves.find(s => s.id === id);
                        showConfirm('حذف الرف الرئيسي', `هل أنت متأكد من حذف "${shelf ? shelf.name : ''}"؟`, () => {
                            shelves = shelves.filter(s => s.id !== id);
                            saveData(shelves);
                            showToast('تم الحذف ✓');
                            navigateTo('home');
                        });
                    });
                });
                document.querySelectorAll('[data-action="delete-subshelf"]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        const shelf = getCurrentShelf();
                        const subshelf = shelf ? (shelf.subShelves || []).find(ss => ss.id === id) : null;
                        showConfirm('حذف الرف الفرعي', `هل أنت متأكد من حذف "${subshelf ? subshelf.name : ''}"؟`, () => {
                            if (shelf) {
                                shelf.subShelves = (shelf.subShelves || []).filter(ss => ss.id !== id);
                                saveData(shelves);
                                showToast('تم الحذف ✓');
                                renderAll();
                            }
                        });
                    });
                });
                document.querySelectorAll('[data-action="delete-product"]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        const parentType = this.dataset.parentType;
                        const parentId = this.dataset.parent;
                        let productName = '';
                        if (parentType === 'subshelf') {
                            const shelf = getCurrentShelf();
                            const ss = shelf ? (shelf.subShelves || []).find(ss => ss.id === parentId) : null;
                            const prod = ss ? (ss.products || []).find(p => p.id === id) : null;
                            productName = prod ? prod.name : '';
                        } else {
                            const shelf = shelves.find(s => s.id === parentId);
                            const prod = shelf ? (shelf.products || []).find(p => p.id === id) : null;
                            productName = prod ? prod.name : '';
                        }
                        showConfirm('حذف المنتج', `هل أنت متأكد من حذف "${productName}"؟`, () => {
                            if (parentType === 'subshelf') {
                                const shelf = getCurrentShelf();
                                const ss = shelf ? (shelf.subShelves || []).find(ss => ss.id === parentId) : null;
                                if (ss) { ss.products = (ss.products || []).filter(p => p.id !== id); saveData(shelves); }
                            } else {
                                const shelf = shelves.find(s => s.id === parentId);
                                if (shelf) { shelf.products = (shelf.products || []).filter(p => p.id !== id); saveData(shelves); }
                            }
                            showToast('تم الحذف ✓');
                            renderAll();
                        });
                    });
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // --- Auto-fill type from serial ---
            function getTypeFromSerial(serial) {
                if (!serial) return null;
                let bestMatch = null;
                let bestLen = 0;
                for (const mapping of serialMappings) {
                    if (serial.startsWith(mapping.prefix) && mapping.prefix.length > bestLen) {
                        bestMatch = mapping.type;
                        bestLen = mapping.prefix.length;
                    }
                }
                return bestMatch;
            }

            function attachSerialAutoFill(serialInputId, typeInputId) {
                const serialInput = document.getElementById(serialInputId);
                const typeInput = document.getElementById(typeInputId);
                if (!serialInput || !typeInput) return;
                const handler = () => {
                    const serial = serialInput.value.trim();
                    const autoType = getTypeFromSerial(serial);
                    if (autoType) {
                        typeInput.value = autoType;
                    }
                };
                serialInput.addEventListener('input', handler);
            }

            // --- Modals ---
            function openModal(title, bodyHtml, primaryLabel, onPrimary, cancelLabel = 'إلغاء', onCancel = null, extraBtn = null) {
                $modalTitle.textContent = title;
                $modalBody.innerHTML = bodyHtml;
                let btnsHtml = '';
                if (extraBtn) btnsHtml += `<button class="btn btn-danger" id="modalExtraBtn">${extraBtn.label}</button>`;
                btnsHtml += `<button class="btn btn-cancel" id="modalCancelBtn">${cancelLabel}</button>`;
                btnsHtml += `<button class="btn btn-primary" id="modalPrimaryBtn">${primaryLabel}</button>`;
                $modalBtns.innerHTML = btnsHtml;
                $modalOverlay.classList.add('active');

                const $primaryBtn = document.getElementById('modalPrimaryBtn');
                const $cancelBtn = document.getElementById('modalCancelBtn');
                const $extraBtn = document.getElementById('modalExtraBtn');

                function close() {
                    $modalOverlay.classList.remove('active');
                    cleanup();
                }
                function cleanup() {
                    if ($primaryBtn) $primaryBtn.removeEventListener('click', primaryHandler);
                    if ($cancelBtn) $cancelBtn.removeEventListener('click', cancelHandler);
                    if ($extraBtn) $extraBtn.removeEventListener('click', extraHandler);
                    $modalOverlay.removeEventListener('click', overlayHandler);
                }
                function primaryHandler(e) { e.stopPropagation(); if (onPrimary) onPrimary(close); }
                function cancelHandler(e) { e.stopPropagation(); if (onCancel) onCancel(); close(); }
                function extraHandler(e) { e.stopPropagation(); if (extraBtn && extraBtn.onClick) extraBtn.onClick(close); }
                function overlayHandler(e) { if (e.target === $modalOverlay) { if (onCancel) onCancel(); close(); } }
                if ($primaryBtn) $primaryBtn.addEventListener('click', primaryHandler);
                if ($cancelBtn) $cancelBtn.addEventListener('click', cancelHandler);
                if ($extraBtn) $extraBtn.addEventListener('click', extraHandler);
                $modalOverlay.addEventListener('click', overlayHandler);
                setTimeout(() => {
                    const firstInput = $modalBody.querySelector('input');
                    if (firstInput) firstInput.focus();
                }, 350);
            }

            function closeModal() {
                $modalOverlay.classList.remove('active');
            }

            function openAddShelfModal() {
                openModal('إضافة رف رئيسي', `<div class="form-group"><label>اسم الرف</label><input id="inputShelfName" placeholder="مثال: رف المستودع"></div>`, 'إضافة', (close) => {
                    const name = document.getElementById('inputShelfName').value.trim();
                    if (!name) { showToast('⚠️ الرجاء إدخال اسم الرف'); return; }
                    shelves.push({ id: generateId(), name, subShelves: [], products: [] });
                    saveData(shelves);
                    close();
                    showToast('✅ تم إضافة الرف');
                    renderAll();
                });
            }

            function openAddSubShelfModal() {
                openModal('إضافة رف فرعي', `<div class="form-group"><label>اسم الرف الفرعي</label><input id="inputSubShelfName" placeholder="مثال: رف A1"></div>`, 'إضافة', (close) => {
                    const name = document.getElementById('inputSubShelfName').value.trim();
                    if (!name) { showToast('⚠️ الرجاء إدخال الاسم'); return; }
                    const shelf = getCurrentShelf();
                    if (!shelf) { close(); return; }
                    if (!shelf.subShelves) shelf.subShelves = [];
                    shelf.subShelves.push({ id: generateId(), name, products: [] });
                    saveData(shelves);
                    close();
                    showToast('✅ تم إضافة الرف الفرعي');
                    renderAll();
                });
            }

            function openAddProductModal() {
                const shelf = getCurrentShelf();
                const subshelf = getCurrentSubShelf();
                const targetLabel = subshelf ? subshelf.name : (shelf ? shelf.name : '');
                openModal('إضافة منتج' + (targetLabel ? ' إلى: ' + targetLabel : ''),
                    `<div class="form-group"><label>الرقم التسلسلي</label><input id="inputSerial" placeholder="مثال: 00004-12"></div>
                     <div class="form-group"><label>اسم المنتج</label><input id="inputProdName" placeholder="اسم المنتج"></div>
                     <div class="form-group"><label>النوع / الفئة</label><input id="inputProdType" placeholder="يكتشف تلقائياً من السيريال"></div>
                     <div class="form-group"><label>عدد المخزون</label><input type="number" id="inputStock" placeholder="0" min="0" value="0"></div>`,
                    'إضافة', (close) => {
                        const serial = document.getElementById('inputSerial').value.trim();
                        const name = document.getElementById('inputProdName').value.trim();
                        const type = document.getElementById('inputProdType').value.trim();
                        const stock = parseInt(document.getElementById('inputStock').value, 10);
                        if (!serial || !name || !type || isNaN(stock) || stock < 0) { showToast('⚠️ جميع الحقول مطلوبة'); return; }
                        const product = { id: generateId(), serial, name, type, stock };
                        if (currentView === 'subshelf' && subshelf) {
                            if (!subshelf.products) subshelf.products = [];
                            subshelf.products.push(product);
                        } else if (currentView === 'shelf' && shelf) {
                            if (!shelf.products) shelf.products = [];
                            shelf.products.push(product);
                        }
                        saveData(shelves);
                        close();
                        showToast('✅ تم إضافة المنتج');
                        renderAll();
                    }, 'إلغاء', null, null);
                setTimeout(() => attachSerialAutoFill('inputSerial', 'inputProdType'), 100);
            }

            function openEditProductModal(product, subshelf, shelf) {
                const targetLabel = subshelf ? subshelf.name : (shelf ? shelf.name : '');
                openModal('تعديل المنتج' + (targetLabel ? ' - ' + targetLabel : ''),
                    `<div class="form-group"><label>الرقم التسلسلي</label><input id="inputSerial" value="${escapeHtml(product.serial)}"></div>
                     <div class="form-group"><label>اسم المنتج</label><input id="inputProdName" value="${escapeHtml(product.name)}"></div>
                     <div class="form-group"><label>النوع / الفئة</label><input id="inputProdType" value="${escapeHtml(product.type)}"></div>
                     <div class="form-group"><label>عدد المخزون</label><input type="number" id="inputStock" value="${product.stock || 0}" min="0"></div>`,
                    'حفظ', (close) => {
                        const serial = document.getElementById('inputSerial').value.trim();
                        const name = document.getElementById('inputProdName').value.trim();
                        const type = document.getElementById('inputProdType').value.trim();
                        const stock = parseInt(document.getElementById('inputStock').value, 10);
                        if (!serial || !name || !type || isNaN(stock) || stock < 0) { showToast('⚠️ جميع الحقول مطلوبة'); return; }
                        product.serial = serial; product.name = name; product.type = type; product.stock = stock;
                        saveData(shelves);
                        close();
                        showToast('✅ تم التحديث');
                        renderAll();
                    }, 'إلغاء', null, {
                        label: 'حذف المنتج',
                        onClick: (close) => {
                            close();
                            showConfirm('حذف المنتج', `هل أنت متأكد من حذف "${product.name}"؟`, () => {
                                if (subshelf) subshelf.products = (subshelf.products || []).filter(p => p.id !== product.id);
                                else if (shelf) shelf.products = (shelf.products || []).filter(p => p.id !== product.id);
                                saveData(shelves);
                                showToast('تم الحذف ✓');
                                renderAll();
                            });
                        }
                    });
                setTimeout(() => attachSerialAutoFill('inputSerial', 'inputProdType'), 100);
            }

            function openMappingsModal() {
                let mappingsHtml = '';
                if (serialMappings.length === 0) {
                    mappingsHtml = '<p style="text-align:center;color:#8e8e93;">لا توجد قواعد بعد</p>';
                } else {
                    mappingsHtml = '<ul style="list-style:none;padding:0;margin:0 0 16px;">';
                    serialMappings.forEach((m, idx) => {
                        mappingsHtml += `<li style="display:flex;align-items:center;justify-content:space-between;background:#f5f5f7;border-radius:8px;padding:8px 12px;margin-bottom:6px;">
                            <span><strong>${escapeHtml(m.prefix)}</strong> ← ${escapeHtml(m.type)}</span>
                            <button class="btn-delete-mapping" data-index="${idx}" style="background:none;border:none;font-size:18px;cursor:pointer;color:#ff3b30;">🗑️</button>
                        </li>`;
                    });
                    mappingsHtml += '</ul>';
                }
                mappingsHtml += `<div style="display:flex;gap:8px;align-items:flex-end;">
                    <div class="form-group" style="flex:1;margin-bottom:0;"><label>بادئة السيريال</label><input id="newPrefix" placeholder="مثلاً 00004"></div>
                    <div class="form-group" style="flex:1;margin-bottom:0;"><label>النوع التلقائي</label><input id="newType" placeholder="ذكاء اصطناعي"></div>
                    <button id="addMappingBtn" style="height:44px;padding:0 16px;border-radius:8px;border:none;background:#0071e3;color:#fff;font-weight:600;flex-shrink:0;">إضافة</button>
                </div>`;
                openModal('⚙️ إدارة ربط السيريال', mappingsHtml, 'إغلاق', (close) => close(), 'إغلاق');
                document.getElementById('addMappingBtn').addEventListener('click', () => {
                    const prefix = document.getElementById('newPrefix').value.trim();
                    const type = document.getElementById('newType').value.trim();
                    if (!prefix || !type) { showToast('⚠️ املأ الحقلين'); return; }
                    serialMappings.push({ prefix, type });
                    saveMappings(serialMappings);
                    showToast('✅ تمت الإضافة');
                    closeModal();
                    setTimeout(() => openMappingsModal(), 300);
                });
                document.querySelectorAll('.btn-delete-mapping').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.closest('button').dataset.index, 10);
                        serialMappings.splice(idx, 1);
                        saveMappings(serialMappings);
                        showToast('تم الحذف');
                        closeModal();
                        setTimeout(() => openMappingsModal(), 300);
                    });
                });
            }

            // --- Confirm dialog ---
            function showConfirm(title, sub, callback) {
                $confirmMsg.textContent = title;
                $confirmSub.textContent = sub || 'لا يمكن التراجع';
                confirmCallback = callback;
                $confirmOverlay.classList.add('active');
            }
            function hideConfirm() {
                $confirmOverlay.classList.remove('active');
                confirmCallback = null;
            }

            // --- Event bindings ---
            $btnBack.addEventListener('click', goBack);
            $btnSearch.addEventListener('click', () => {
                if ($searchWrap.classList.contains('hidden')) { $searchWrap.classList.remove('hidden');
                    $searchInput.focus(); } else { $searchWrap.classList.add('hidden');
                    $searchInput.value = '';
                    searchQuery = '';
                    renderAll(); }
            });
            $searchInput.addEventListener('input', function() { searchQuery = this.value;
                renderAll(); });
            $btnSettings.addEventListener('click', openMappingsModal);

            $fab.addEventListener('click', () => {
                if (currentView === 'home') openAddShelfModal();
                else if (currentView === 'shelf') showFabChoiceForShelf();
                else if (currentView === 'subshelf') openAddProductModal();
            });

            function showFabChoiceForShelf() {
                const shelf = getCurrentShelf();
                if (!shelf) return;
                openModal('إضافة إلى: ' + shelf.name, '<p style="text-align:center;color:#6d6d72;">اختر نوع الإضافة:</p>', '📂 إضافة رف فرعي', (close) => { close();
                    setTimeout(openAddSubShelfModal, 300); }, 'إلغاء', null, { label: '📦 إضافة منتج مباشر', onClick: (close) => { close();
                        setTimeout(openAddProductModal, 300); } });
                setTimeout(() => {
                    const prim = document.getElementById('modalPrimaryBtn');
                    const extra = document.getElementById('modalExtraBtn');
                    if (prim) prim.textContent = '📂 إضافة رف فرعي';
                    if (extra) extra.textContent = '📦 إضافة منتج مباشر';
                }, 50);
            }

            $confirmOk.addEventListener('click', () => { if (confirmCallback) confirmCallback();
                hideConfirm(); });
            $confirmCancel.addEventListener('click', hideConfirm);
            $confirmOverlay.addEventListener('click', (e) => { if (e.target === $confirmOverlay) hideConfirm(); });

            let touchStartY = 0;
            $modalSheet.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
            $modalSheet.addEventListener('touchmove', (e) => { if (e.touches[0].clientY - touchStartY > 80 && $modalSheet.scrollTop <= 5) closeModal(); }, { passive: true });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { if ($confirmOverlay.classList.contains('active')) hideConfirm(); else if ($modalOverlay.classList.contains('active')) closeModal(); } });

            function init() {
                navigateTo('home');
            }
            init();
            console.log('📦 تطبيق المخزون الذكي مع ربط السيريال بالنوع');
        })();
    </script>
</body>
</html>
