<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f2f2f7">
    <title>نظام إدارة المخزون والمبيعات</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --text2: #6d6d72;
            --text3: #8e8e93;
            --accent: #0071e3;
            --accent2: #e8f2ff;
            --danger: #ff3b30;
            --danger2: #ffeaea;
            --success: #34c759;
            --success2: #e8f8ed;
            --warning: #ff9500;
            --warning2: #fff5e6;
            --border: #e5e5ea;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
            --header-h: 52px;
            --breadcrumb-h: 38px;
            --fab-size: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
        body {
            font-family:var(--font); background:var(--bg); color:var(--text);
            min-height:100vh; min-height:-webkit-fill-available; overflow-x:hidden;
            user-select:none; -webkit-user-select:none; -webkit-overflow-scrolling:touch;
            padding-top:calc(var(--header-h) + var(--safe-top) + var(--breadcrumb-h));
            padding-bottom:calc(var(--fab-size) + 32px + var(--safe-bottom));
        }
        .header { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(242,242,247,0.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding-top:var(--safe-top); border-bottom:0.5px solid var(--border); }
        .header-inner { height:var(--header-h); display:flex; align-items:center; padding:0 10px; gap:4px; }
        .header .btn-icon {
            width:36px; height:36px; border-radius:50%; border:none; background:var(--card); color:var(--text2); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition); flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,0.06);
        }
        .header .btn-back { color:var(--accent); font-size:20px; }
        .header .btn-back.hidden { opacity:0; pointer-events:none; transform:translateX(-12px); }
        .header .btn-settings.hidden, .header .btn-backup.hidden, .header .btn-sales.hidden { display:none; }
        .header .btn-icon:active { transform:scale(0.92); background:#e8e8ed; }
        .header .title { font-size:20px; font-weight:700; letter-spacing:-0.3px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }

        .breadcrumb { position:fixed; top:calc(var(--header-h) + var(--safe-top)); left:0; right:0; z-index:99; background:var(--bg); height:var(--breadcrumb-h); display:flex; align-items:center; padding:0 16px; gap:4px; font-size:13px; color:var(--text3); overflow-x:auto; white-space:nowrap; }
        .breadcrumb span { flex-shrink:0; color:var(--text3); }
        .breadcrumb .sep { margin:0 2px; font-size:11px; }
        .breadcrumb .crumb-active { color:var(--accent); font-weight:600; }

        .main-content { padding:8px 16px; display:flex; flex-direction:column; gap:10px; min-height:200px; }

        .stats-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px; padding:0 16px; }
        .stat-chip { flex:1; min-width:70px; background:var(--card); border-radius:var(--radius-sm); padding:12px 10px; text-align:center; box-shadow:var(--shadow); }
        .stat-chip .stat-val { font-size:24px; font-weight:700; letter-spacing:-0.5px; color:var(--text); line-height:1; }
        .stat-chip .stat-lbl { font-size:11px; color:var(--text3); margin-top:4px; font-weight:500; }
        .stat-chip.accent { background:var(--accent2); } .stat-chip.accent .stat-val { color:var(--accent); }
        .stat-chip.warning-chip { background:var(--warning2); } .stat-chip.warning-chip .stat-val { color:var(--warning); }
        .stat-chip.danger-chip { background:var(--danger2); } .stat-chip.danger-chip .stat-val { color:var(--danger); }
        .stat-chip.success-chip { background:var(--success2); } .stat-chip.success-chip .stat-val { color:var(--success); }

        .total-bars { display:flex; gap:8px; margin:0 16px 8px; flex-wrap:wrap; }
        .total-bar-btn {
            flex:1; min-width:120px; padding:12px 10px; background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1.5px solid var(--border);
            display:flex; align-items:center; justify-content:center; gap:4px; cursor:pointer; font-size:14px; font-weight:700; color:var(--text); transition:var(--transition);
        }
        .total-bar-btn:active { transform:scale(0.98); background:#f0f0f5; }
        .total-bar-btn .val { color:var(--accent); letter-spacing:-0.5px; }
        .total-bar-btn.profit .val { color:#34c759; }
        .total-bar-btn.cost .val { color:var(--warning); }

        .card { background:var(--card); border-radius:var(--radius); padding:15px 14px; box-shadow:var(--shadow); cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:12px; border:1px solid transparent; animation:fadeInUp 0.35s ease both; }
        .card:active { transform:scale(0.975); background:#f9f9fb; border-color:#e0e0e5; }
        .card .icon-box { width:44px; height:44px; border-radius:var(--radius-xs); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
        .card .icon-box.shelf-icon { background:#e8f2ff; } .card .icon-box.subshelf-icon { background:#f0e6f6; } .card .icon-box.product-icon { background:#e8f8ed; }
        .card .info { flex:1; min-width:0; }
        .card .info .name { font-weight:600; font-size:15px; color:var(--text); line-height:1.2; }
        .card .info .meta { font-size:12px; color:var(--text3); margin-top:3px; display:flex; gap:6px; flex-wrap:wrap; }
        .card .info .meta span { background:#f5f5f7; padding:3px 8px; border-radius:20px; font-weight:500; font-size:11px; }
        .card .badge { font-size:12px; font-weight:600; padding:5px 10px; border-radius:20px; flex-shrink:0; }
        .badge-stock-good { background:var(--success2); color:var(--success); } .badge-stock-low { background:var(--warning2); color:var(--warning); } .badge-stock-out { background:var(--danger2); color:var(--danger); }
        .card .arrow-left { font-size:14px; color:#c7c7cc; flex-shrink:0; }
        .card .btn-delete { width:30px; height:30px; border-radius:50%; border:none; background:#f5f5f7; color:#c7c7cc; font-size:14px; cursor:pointer; flex-shrink:0; transition:var(--transition); display:flex; align-items:center; justify-content:center; z-index:2; }
        .card .btn-delete:active { background:var(--danger2); color:var(--danger); transform:scale(0.9); }

        @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .empty-state { text-align:center; padding:40px 20px; animation:fadeInUp 0.5s ease; }
        .empty-state .emoji { font-size:56px; display:block; margin-bottom:12px; }
        .empty-state .msg { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
        .empty-state .sub { font-size:13px; color:var(--text3); line-height:1.5; }

        .fab { position:fixed; bottom:calc(24px + var(--safe-bottom)); right:20px; width:var(--fab-size); height:var(--fab-size); border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:28px; cursor:pointer; box-shadow:0 6px 20px rgba(0,113,227,0.35); z-index:90; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
        .fab:active { transform:scale(0.9); box-shadow:0 3px 12px rgba(0,113,227,0.25); }

        .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition:opacity 0.3s ease; display:flex; align-items:flex-end; justify-content:center; }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-sheet { background:#ffffff; border-radius:20px 20px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px 20px calc(20px + var(--safe-bottom)); box-shadow:var(--shadow-lg); transform:translateY(100%); transition:transform 0.32s cubic-bezier(0.32,0.72,0,1); }
        .modal-overlay.active .modal-sheet { transform:translateY(0); }
        .modal-sheet .modal-handle { width:36px; height:5px; background:#d1d1d6; border-radius:3px; margin:0 auto 16px; }
        .modal-sheet h3 { font-size:18px; font-weight:700; margin-bottom:16px; text-align:center; }
        .modal-sheet .form-group { margin-bottom:14px; }
        .modal-sheet label { display:block; font-size:13px; font-weight:600; color:var(--text2); margin-bottom:5px; }
        .modal-sheet input, .modal-sheet select { width:100%; padding:12px 14px; border-radius:var(--radius-xs); border:1.5px solid var(--border); font-size:16px; font-family:var(--font); background:#f9f9fb; transition:var(--transition); color:var(--text); -webkit-appearance:none; }
        .modal-sheet input:focus { outline:none; border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(0,113,227,0.1); }
        .modal-sheet .btn-row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
        .modal-sheet .btn { flex:1; padding:13px; border-radius:var(--radius-xs); border:none; font-size:16px; font-weight:600; cursor:pointer; font-family:var(--font); transition:var(--transition); }
        .modal-sheet .btn-primary { background:var(--accent); color:#fff; } .modal-sheet .btn-primary:active { background:#005bbf; transform:scale(0.97); }
        .modal-sheet .btn-cancel { background:#f5f5f7; color:var(--text2); } .modal-sheet .btn-cancel:active { background:#e5e5ea; transform:scale(0.97); }
        .modal-sheet .btn-danger { background:var(--danger); color:#fff; } .modal-sheet .btn-danger:active { background:#d63029; transform:scale(0.97); }
        .modal-sheet .btn-success { background:var(--success); color:#fff; } .modal-sheet .btn-success:active { background:#2db84d; transform:scale(0.97); }

        .search-bar-wrap { padding:4px 16px 8px; position:relative; }
        .search-bar-wrap input { width:100%; padding:10px 14px 10px 36px; border-radius:24px; border:1.5px solid var(--border); font-size:15px; font-family:var(--font); background:#f9f9fb; transition:var(--transition); color:var(--text); }
        .search-bar-wrap input:focus { outline:none; border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(0,113,227,0.08); }
        .search-bar-wrap .search-icon { position:absolute; left:26px; top:50%; transform:translateY(-50%); font-size:15px; color:#c7c7cc; pointer-events:none; }
        .search-bar-wrap.hidden { display:none; }

        .toast { position:fixed; bottom:calc(var(--fab-size) + 40px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(80px); background:#1c1c1e; color:#fff; padding:10px 20px; border-radius:24px; font-size:14px; font-weight:500; z-index:300; pointer-events:none; opacity:0; transition:all 0.3s ease; white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        .confirm-overlay { position:fixed; inset:0; z-index:250; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s ease; padding:20px; }
        .confirm-overlay.active { opacity:1; pointer-events:auto; }
        .confirm-dialog { background:#fff; border-radius:var(--radius); padding:20px; text-align:center; width:100%; max-width:320px; box-shadow:var(--shadow-lg); transform:scale(0.9); transition:transform 0.25s ease; }
        .confirm-overlay.active .confirm-dialog { transform:scale(1); }
        .confirm-dialog .confirm-emoji { font-size:40px; display:block; margin-bottom:8px; }
        .confirm-dialog p { font-size:15px; font-weight:600; margin-bottom:4px; }
        .confirm-dialog .sub { font-size:12px; color:var(--text3); margin-bottom:16px; }
        .confirm-dialog .btn-row { display:flex; gap:8px; }
        .confirm-dialog .btn { flex:1; padding:11px; border-radius:var(--radius-xs); border:none; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--font); }
        .confirm-dialog .btn-del { background:var(--danger); color:#fff; } .confirm-dialog .btn-del:active { background:#c62828; }
        .confirm-dialog .btn-cancel { background:#f5f5f7; color:var(--text2); }

        .sale-card { background:var(--card); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:8px; position: relative; }
        .sale-card .sale-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .sale-card .sale-date { font-size:12px; color:var(--text3); }
        .sale-card .sale-profit { font-weight:700; color:var(--success); }
        .sale-card .sale-details { font-size:13px; color:var(--text2); display:flex; gap:12px; flex-wrap:wrap; padding-right: 5px; }
        .btn-delete-sale { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--danger); padding: 4px 8px; border-radius: 50%; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .btn-delete-sale:active { background: var(--danger2); transform: scale(0.9); }

        .sale-quantity-input { width:60px; padding:8px; border-radius:8px; border:1.5px solid var(--border); font-size:16px; text-align:center; font-family:var(--font); background:#f9f9fb; }
        .sale-discount-input { width:60px; padding:8px; border-radius:8px; border:1.5px solid var(--warning); font-size:16px; text-align:center; font-family:var(--font); background:#f9f9fb; }
        .sale-quantity-input:focus, .sale-discount-input:focus { outline:none; border-color:var(--accent); }

        .section-title { font-size:13px; font-weight:700; color:#8e8e93; padding:4px 0; letter-spacing:0.5px; }

        /* Charts styles */
        .chart-container { background: var(--card); border-radius: var(--radius); padding: 16px; margin-top: 8px; }
        .donut-chart { width: 160px; height: 160px; margin: 0 auto; border-radius: 50%; position: relative; }
        .donut-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 14px; font-weight: 700; color: var(--text); }
        .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .legend-color { width: 12px; height: 12px; border-radius: 4px; }
        .profit-bar-item { margin-bottom: 10px; }
        .profit-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .profit-bar-bg { height: 10px; background: #e5e5ea; border-radius: 5px; overflow: hidden; }
        .profit-bar-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.5s ease; }

        @media (min-width:500px) {
            .main-content, .stats-row, .total-bars, .search-bar-wrap { max-width:480px; margin-left:auto; margin-right:auto; }
            .stats-row { padding:0 8px; }
            .total-bars { margin:0 auto 8px; }
            .search-bar-wrap { padding:4px 8px 8px; }
        }
    </style>
</head>
<body>

<div class="header" id="header">
    <div class="header-inner">
        <button class="btn-icon btn-back hidden" id="btnBack" title="رجوع">‹</button>
        <span class="title" id="headerTitle">📦 مخزوني</span>
        <button class="btn-icon btn-sales" id="btnSales" title="المبيعات">🛒</button>
        <button class="btn-icon btn-backup" id="btnBackup" title="نسخ احتياطي">💾</button>
        <button class="btn-icon btn-settings" id="btnSettings" title="إدارة ربط السيريال">⚙️</button>
        <button class="btn-icon btn-search" id="btnSearch" title="بحث">🔍</button>
    </div>
</div>

<div class="breadcrumb" id="breadcrumb">
    <span>🏠</span><span class="sep">›</span><span class="crumb-active">الرئيسية</span>
</div>

<div class="search-bar-wrap hidden" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="بحث...">
</div>

<div class="stats-row" id="statsRow"></div>
<div class="total-bars" id="totalBars"></div>
<div class="main-content" id="mainContent"></div>

<button class="fab" id="fab" title="إضافة">+</button>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet" id="modalSheet">
        <div class="modal-handle"></div>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
        <div class="btn-row" id="modalBtns"></div>
    </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
        <span class="confirm-emoji">⚠️</span>
        <p id="confirmMsg"></p>
        <p class="sub" id="confirmSub"></p>
        <div class="btn-row">
            <button class="btn btn-cancel" id="confirmCancel">إلغاء</button>
            <button class="btn btn-del" id="confirmOk">تأكيد</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFileInput" style="display:none" accept=".json">

<script>
    (function() {
        const STORAGE_KEY = 'shelves_inventory_v14';
        const MAPPINGS_KEY = 'serial_mappings_v10';
        const SALES_KEY = 'sales_history_v9';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    if (Array.isArray(data)) {
                        data.forEach(s => {
                            (s.products||[]).forEach(p => { if(p.price===undefined) p.price=0; if(p.cost===undefined) p.cost=0; });
                            (s.subShelves||[]).forEach(ss => {
                                (ss.products||[]).forEach(p => { if(p.price===undefined) p.price=0; if(p.cost===undefined) p.cost=0; });
                            });
                        });
                        return data;
                    }
                }
            } catch(e) {}
            return [];
        }
        function saveData(shelves) { localStorage.setItem(STORAGE_KEY, JSON.stringify(shelves)); }
        function loadMappings() { try { return JSON.parse(localStorage.getItem(MAPPINGS_KEY)) || []; } catch(e) { return []; } }
        function saveMappings(m) { localStorage.setItem(MAPPINGS_KEY, JSON.stringify(m)); }
        function loadSales() { try { return JSON.parse(localStorage.getItem(SALES_KEY)) || []; } catch(e) { return []; } }
        function saveSales(sales) { localStorage.setItem(SALES_KEY, JSON.stringify(sales)); }
        function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

        let shelves = loadData();
        let serialMappings = loadMappings();
        let salesHistory = loadSales();
        let currentView = 'home';
        let currentShelfId = null;
        let currentSubShelfId = null;
        let searchQuery = '';
        let confirmCallback = null;

        function getCurrentShelf() { return shelves.find(s => s.id === currentShelfId); }
        function getCurrentSubShelf() { const s = getCurrentShelf(); return s ? (s.subShelves||[]).find(ss => ss.id === currentSubShelfId) : null; }

        const $headerTitle = document.getElementById('headerTitle'), $btnBack = document.getElementById('btnBack'), $btnSearch = document.getElementById('btnSearch'), $btnSettings = document.getElementById('btnSettings'), $btnBackup = document.getElementById('btnBackup'), $btnSales = document.getElementById('btnSales');
        const $breadcrumb = document.getElementById('breadcrumb'), $searchWrap = document.getElementById('searchWrap'), $searchInput = document.getElementById('searchInput');
        const $statsRow = document.getElementById('statsRow'), $totalBars = document.getElementById('totalBars'), $mainContent = document.getElementById('mainContent'), $fab = document.getElementById('fab');
        const $modalOverlay = document.getElementById('modalOverlay'), $modalSheet = document.getElementById('modalSheet'), $modalTitle = document.getElementById('modalTitle'), $modalBody = document.getElementById('modalBody'), $modalBtns = document.getElementById('modalBtns');
        const $confirmOverlay = document.getElementById('confirmOverlay'), $confirmMsg = document.getElementById('confirmMsg'), $confirmSub = document.getElementById('confirmSub'), $confirmOk = document.getElementById('confirmOk'), $confirmCancel = document.getElementById('confirmCancel');
        const $toast = document.getElementById('toast'), $importFile = document.getElementById('importFileInput');
        let toastTimer;
        function showToast(m) { clearTimeout(toastTimer); $toast.textContent=m; $toast.classList.add('show'); toastTimer=setTimeout(()=>$toast.classList.remove('show'),2200); }

        function navigateTo(view, shelfId=null, subShelfId=null, shelfName='', subShelfName='') {
            currentView = view;
            if(view === 'home') {
                currentShelfId=null; currentSubShelfId=null; $btnBack.classList.add('hidden'); $btnSettings.classList.remove('hidden'); $btnBackup.classList.remove('hidden'); $btnSales.classList.remove('hidden');
                $headerTitle.textContent='📦 مخزوني'; $breadcrumb.innerHTML='<span>🏠</span><span class="sep">›</span><span class="crumb-active">الرئيسية</span>';
                $searchWrap.classList.add('hidden'); $fab.style.display='flex';
            } else if(view === 'shelf') {
                currentShelfId=shelfId; currentSubShelfId=null; $btnBack.classList.remove('hidden'); $btnSettings.classList.add('hidden'); $btnBackup.classList.add('hidden'); $btnSales.classList.add('hidden');
                $headerTitle.textContent=shelfName||'الرف'; $breadcrumb.innerHTML='<span>🏠</span><span class="sep">›</span><span class="crumb-active">'+(shelfName||'الرف')+'</span>';
                $searchWrap.classList.remove('hidden'); $fab.style.display='flex';
            } else if(view === 'subshelf') {
                currentShelfId=shelfId; currentSubShelfId=subShelfId; $btnBack.classList.remove('hidden'); $btnSettings.classList.add('hidden'); $btnBackup.classList.add('hidden'); $btnSales.classList.add('hidden');
                $headerTitle.textContent=subShelfName||'الرف الفرعي'; $breadcrumb.innerHTML='<span>🏠</span><span class="sep">›</span><span>'+(shelfName||'الرف')+'</span><span class="sep">›</span><span class="crumb-active">'+(subShelfName||'الرف الفرعي')+'</span>';
                $searchWrap.classList.remove('hidden'); $fab.style.display='flex';
            } else if(view === 'sales') {
                currentShelfId=null; currentSubShelfId=null; $btnBack.classList.remove('hidden'); $btnSettings.classList.add('hidden'); $btnBackup.classList.add('hidden'); $btnSales.classList.add('hidden');
                $headerTitle.textContent='🛒 المبيعات'; $breadcrumb.innerHTML='<span>🏠</span><span class="sep">›</span><span class="crumb-active">المبيعات</span>';
                $searchWrap.classList.remove('hidden'); $fab.style.display='none';
            }
            $searchInput.value = ''; searchQuery = '';
            renderAll(); window.scrollTo({top:0,behavior:'smooth'});
        }
        function goBack() {
            if(currentView === 'subshelf') { const s=getCurrentShelf(); navigateTo('shelf',currentShelfId,null,s?s.name:''); }
            else if(currentView === 'shelf') navigateTo('home');
            else if(currentView === 'sales') navigateTo('home');
        }

        function getAllProducts() {
            let prods = [];
            shelves.forEach(s => {
                (s.products||[]).forEach(p => prods.push({...p, _loc:s.name, _shelfId:s.id, _subShelfId:null}));
                (s.subShelves||[]).forEach(ss => (ss.products||[]).forEach(p => prods.push({...p, _loc:s.name+' / '+ss.name, _shelfId:s.id, _subShelfId:ss.id})));
            });
            return prods;
        }
        function findProductById(id) {
            for(const s of shelves) {
                const p = (s.products||[]).find(x=>x.id===id); if(p) return {product:p, shelf:s, subshelf:null};
                for(const ss of (s.subShelves||[])) { const sp = (ss.products||[]).find(x=>x.id===id); if(sp) return {product:sp, shelf:s, subshelf:ss}; }
            }
            return null;
        }

        function getVisibleProducts() {
            let prods = [];
            if(currentView === 'home') prods = getAllProducts();
            else if(currentView === 'shelf') {
                const s = getCurrentShelf(); if(s) {
                    (s.products||[]).forEach(p => prods.push({...p, _loc:s.name, _shelfId:s.id, _subShelfId:null}));
                    (s.subShelves||[]).forEach(ss => (ss.products||[]).forEach(p => prods.push({...p, _loc:s.name+' / '+ss.name, _shelfId:s.id, _subShelfId:ss.id})));
                }
            } else if(currentView === 'subshelf') {
                const ss = getCurrentSubShelf(), s = getCurrentShelf();
                if(ss) (ss.products||[]).forEach(p => prods.push({...p, _loc:(s?s.name+' / ':'')+ss.name, _shelfId:s?s.id:null, _subShelfId:ss.id}));
            } else if(currentView === 'sales') {
                prods = getAllProducts();
            }
            const q = searchQuery.toLowerCase().trim();
            if(q) prods = prods.filter(p => p.name.toLowerCase().includes(q) || p.serial.toLowerCase().includes(q) || p.type.toLowerCase().includes(q));
            return prods;
        }

        function calcTotals(prods) {
            let totalValue = 0, totalProfit = 0, totalCost = 0;
            prods.forEach(p => {
                totalValue += (p.price||0) * (p.stock||0);
                totalProfit += ((p.price||0) - (p.cost||0)) * (p.stock||0);
                totalCost += (p.cost||0) * (p.stock||0);
            });
            return { value: totalValue, profit: totalProfit, cost: totalCost };
        }

        function renderTotalBars() {
            if(currentView === 'sales') { $totalBars.innerHTML = ''; return; }
            const prods = getVisibleProducts();
            const { value, profit, cost } = calcTotals(prods);
            if(prods.length === 0) { $totalBars.innerHTML = ''; return; }
            $totalBars.innerHTML = `
                <div class="total-bar-btn" id="valueBtn">💰 القيمة: <span class="val">${value.toFixed(2)} ₪</span></div>
                <div class="total-bar-btn profit" id="profitBtn">📈 الربح: <span class="val">${profit.toFixed(2)} ₪</span></div>
                <div class="total-bar-btn cost" id="costBtn">🏷️ رأس المال: <span class="val">${cost.toFixed(2)} ₪</span></div>
            `;
            document.getElementById('valueBtn')?.addEventListener('click', ()=> openBreakdownModal('القيمة الإجمالية', prods, 'value'));
            document.getElementById('profitBtn')?.addEventListener('click', ()=> openBreakdownModal('تحليل الأرباح', prods, 'profit'));
            document.getElementById('costBtn')?.addEventListener('click', ()=> openBreakdownModal('رأس المال', prods, 'cost'));
        }

        function openBreakdownModal(title, prods, mode) {
            let html = '<div class="breakdown-list">';
            prods.forEach(p => {
                const price = p.price||0, cost = p.cost||0, stock = p.stock||0;
                let display = 0, detailLine = '';
                if(mode === 'value') { display = price * stock; detailLine = `${stock} × ${price.toFixed(2)} ₪`; }
                else if(mode === 'profit') { display = (price - cost) * stock; detailLine = `${stock} × (${price.toFixed(2)} - ${cost.toFixed(2)})`; }
                else if(mode === 'cost') { display = cost * stock; detailLine = `${stock} × ${cost.toFixed(2)} ₪`; }
                html += `<div class="breakdown-item" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);">
                    <div><span style="font-weight:600;">${escapeHtml(p.name)}</span><br><span style="font-size:12px;color:var(--text3);">${escapeHtml(p.serial)} | ${escapeHtml(p._loc||'')}</span></div>
                    <div style="text-align:left;"><span style="font-size:13px;color:var(--text2);">${detailLine}</span><br><span style="font-weight:700;">${display.toFixed(2)} ₪</span></div>
                </div>`;
            });
            const total = mode==='value' ? calcTotals(prods).value : (mode==='profit' ? calcTotals(prods).profit : calcTotals(prods).cost);
            html += `<div style="font-size:20px;font-weight:800;text-align:left;margin-top:12px;padding-top:12px;border-top:2px solid var(--border);">المجموع: ${total.toFixed(2)} ₪</div></div>`;
            openModal(title, html, 'إغلاق', c=>c());
        }

        function renderStats() {
            if(currentView === 'sales') {
                const totalSales = salesHistory.length;
                const totalRevenue = salesHistory.reduce((sum, s) => sum + (s.totalPrice||0), 0);
                const totalProfit = salesHistory.reduce((sum, s) => sum + (s.totalProfit||0), 0);
                const today = new Date().toDateString();
                const todaySales = salesHistory.filter(s => new Date(s.date).toDateString() === today);
                const todayRevenue = todaySales.reduce((sum, s) => sum + (s.totalPrice||0), 0);
                $statsRow.innerHTML = `
                    <div class="stat-chip success-chip"><div class="stat-val">${totalSales}</div><div class="stat-lbl">إجمالي المبيعات</div></div>
                    <div class="stat-chip accent"><div class="stat-val">${totalRevenue.toFixed(0)}</div><div class="stat-lbl">الإيرادات ₪</div></div>
                    <div class="stat-chip success-chip"><div class="stat-val">${totalProfit.toFixed(0)}</div><div class="stat-lbl">صافي الربح ₪</div></div>
                    <div class="stat-chip"><div class="stat-val">${todaySales.length}</div><div class="stat-lbl">مبيعات اليوم</div></div>
                `;
                return;
            }
            let totalShelves = shelves.length, totalSub=0, totalProd=0, totalStock=0, low=0, out=0;
            shelves.forEach(s => {
                totalSub += (s.subShelves||[]).length;
                (s.products||[]).forEach(p => { totalProd++; totalStock+=p.stock||0; if(!p.stock) out++; else if(p.stock<=5) low++; });
                (s.subShelves||[]).forEach(ss => (ss.products||[]).forEach(p => { totalProd++; totalStock+=p.stock||0; if(!p.stock) out++; else if(p.stock<=5) low++; }));
            });
            if(currentView === 'home') {
                $statsRow.innerHTML = `
                    <div class="stat-chip accent"><div class="stat-val">${totalShelves}</div><div class="stat-lbl">رف</div></div>
                    <div class="stat-chip"><div class="stat-val">${totalSub}</div><div class="stat-lbl">فرعي</div></div>
                    <div class="stat-chip"><div class="stat-val">${totalProd}</div><div class="stat-lbl">منتج</div></div>
                    <div class="stat-chip"><div class="stat-val">${totalStock}</div><div class="stat-lbl">مخزون</div></div>
                    ${low?`<div class="stat-chip warning-chip"><div class="stat-val">${low}</div><div class="stat-lbl">منخفض</div></div>`:''}
                    ${out?`<div class="stat-chip danger-chip"><div class="stat-val">${out}</div><div class="stat-lbl">نفذ</div></div>`:''}`;
            } else if(currentView === 'shelf') {
                const s = getCurrentShelf(); let pCount=0, sCount=0;
                if(s) { (s.products||[]).forEach(p=>{pCount++; sCount+=p.stock||0;}); (s.subShelves||[]).forEach(ss=> (ss.products||[]).forEach(p=>{pCount++; sCount+=p.stock||0;})); }
                $statsRow.innerHTML = `<div class="stat-chip accent"><div class="stat-val">${(s?.subShelves||[]).length}</div><div class="stat-lbl">فرعي</div></div><div class="stat-chip"><div class="stat-val">${pCount}</div><div class="stat-lbl">منتج</div></div><div class="stat-chip"><div class="stat-val">${sCount}</div><div class="stat-lbl">مخزون</div></div>`;
            } else {
                const ss = getCurrentSubShelf(); const prods = ss?.products||[]; const st = prods.reduce((a,p)=>a+(p.stock||0),0);
                $statsRow.innerHTML = `<div class="stat-chip accent"><div class="stat-val">${prods.length}</div><div class="stat-lbl">منتج</div></div><div class="stat-chip"><div class="stat-val">${st}</div><div class="stat-lbl">مخزون</div></div>`;
            }
        }

        function renderContent() {
            $mainContent.innerHTML = '';
            if(currentView === 'sales') { renderSalesPage(); return; }
            const q = searchQuery.toLowerCase().trim();
            if(currentView === 'home') {
                let filtered = shelves.filter(s => !q || s.name.toLowerCase().includes(q));
                if(!filtered.length) $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">🏪</span><div class="msg">${q?'لا نتائج':'لا رفوف'}</div></div>`;
                else filtered.forEach((s,i) => {
                    const card = document.createElement('div'); card.className='card'; card.style.animationDelay=(i*0.04)+'s';
                    card.innerHTML = `<div class="icon-box shelf-icon">📦</div><div class="info"><div class="name">${escapeHtml(s.name)}</div><div class="meta"><span>📂 ${(s.subShelves||[]).length} فرعي</span><span>📦 ${(s.products||[]).length + (s.subShelves||[]).reduce((a,ss)=>a+(ss.products||[]).length,0)} منتج</span></div></div><button class="btn-delete" data-action="delete-shelf" data-id="${s.id}">🗑️</button><span class="arrow-left">›</span>`;
                    card.addEventListener('click', e => { if(!e.target.closest('[data-action]')) navigateTo('shelf',s.id,null,s.name); });
                    $mainContent.appendChild(card);
                });
            } else if(currentView === 'shelf') {
                const shelf = getCurrentShelf(); if(!shelf) return navigateTo('home');
                let subs = shelf.subShelves||[], prods = shelf.products||[];
                if(q) { subs = subs.filter(ss=>ss.name.toLowerCase().includes(q)); prods = prods.filter(p=>p.name.toLowerCase().includes(q)||p.serial.toLowerCase().includes(q)||p.type.toLowerCase().includes(q)); }
                if(!subs.length && !prods.length) $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">📭</span><div class="msg">${q?'لا نتائج':'فارغ'}</div></div>`;
                else {
                    if(subs.length) {
                        const h = document.createElement('div'); h.style.cssText='font-size:13px;font-weight:700;color:#8e8e93;padding:4px;'; h.textContent='📂 الرفوف الفرعية'; $mainContent.appendChild(h);
                        subs.forEach(ss => {
                            const card = document.createElement('div'); card.className='card';
                            card.innerHTML = `<div class="icon-box subshelf-icon">📁</div><div class="info"><div class="name">${escapeHtml(ss.name)}</div><div class="meta"><span>📦 ${(ss.products||[]).length} منتج</span></div></div><button class="btn-delete" data-action="delete-subshelf" data-id="${ss.id}">🗑️</button><span class="arrow-left">›</span>`;
                            card.addEventListener('click', e => { if(!e.target.closest('[data-action]')) navigateTo('subshelf',shelf.id,ss.id,shelf.name,ss.name); });
                            $mainContent.appendChild(card);
                        });
                    }
                    if(prods.length) {
                        if(subs.length) { const sep = document.createElement('div'); sep.style.cssText='height:8px;'; $mainContent.appendChild(sep); }
                        const h2 = document.createElement('div'); h2.style.cssText='font-size:13px;font-weight:700;color:#8e8e93;padding:4px;'; h2.textContent='📦 منتجات مباشرة'; $mainContent.appendChild(h2);
                        prods.forEach(p => $mainContent.appendChild(createProductCard(p, shelf, null)));
                    }
                }
            } else if(currentView === 'subshelf') {
                const subshelf = getCurrentSubShelf(); if(!subshelf) { const s=getCurrentShelf(); navigateTo('shelf',currentShelfId,null,s?s.name:''); return; }
                let prods = subshelf.products||[];
                if(q) prods = prods.filter(p=>p.name.toLowerCase().includes(q)||p.serial.toLowerCase().includes(q)||p.type.toLowerCase().includes(q));
                if(!prods.length) $mainContent.innerHTML = `<div class="empty-state"><span class="emoji">📦</span><div class="msg">${q?'لا نتائج':'لا منتجات'}</div></div>`;
                else prods.forEach(p => $mainContent.appendChild(createProductCard(p, null, subshelf)));
            }
            attachDeleteListeners();
        }

        function renderSalesPage() {
            const q = searchQuery.toLowerCase().trim();
            let allProds = getAllProducts();
            if(q) allProds = allProds.filter(p => p.name.toLowerCase().includes(q) || p.serial.toLowerCase().includes(q) || p.type.toLowerCase().includes(q));

            const salesSection = document.createElement('div');
            salesSection.innerHTML = '<div class="section-title">🛍️ سجل المبيعات</div>';
            if(salesHistory.length === 0) {
                salesSection.innerHTML += '<div class="empty-state"><span class="emoji">📋</span><div class="msg">لا توجد مبيعات بعد</div><div class="sub">ابحث عن منتج وأدخل الكمية المباعة</div></div>';
            } else {
                const recentSales = [...salesHistory].reverse().slice(0, 30);
                recentSales.forEach(sale => {
                    const saleCard = document.createElement('div'); saleCard.className='sale-card';
                    const discountStr = sale.discount > 0 ? `<span>🏷️ خصم: ${sale.discount.toFixed(2)} ₪</span>` : '';
                    saleCard.innerHTML = `
                        <div class="sale-header">
                            <strong>${escapeHtml(sale.productName)}</strong>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span class="sale-date">${new Date(sale.date).toLocaleString('ar')}</span>
                                <button class="btn-delete-sale" data-sale-id="${sale.id}">🗑️</button>
                            </div>
                        </div>
                        <div class="sale-details">
                            <span>🔢 ${escapeHtml(sale.serial)}</span>
                            <span>📦 الكمية: ${sale.quantity}</span>
                            <span>💰 السعر: ${sale.unitPrice.toFixed(2)} ₪</span>
                            <span>💵 الإجمالي: ${sale.totalPrice.toFixed(2)} ₪</span>
                            ${discountStr}
                            <span class="sale-profit">📈 الربح: ${sale.totalProfit.toFixed(2)} ₪</span>
                        </div>`;
                    salesSection.appendChild(saleCard);
                });
                if(salesHistory.length > 30) {
                    const more = document.createElement('p');
                    more.style.cssText='text-align:center;color:var(--text3);font-size:13px;margin-top:8px;';
                    more.textContent = `... و ${salesHistory.length - 30} عملية بيع أخرى`;
                    salesSection.appendChild(more);
                }
            }
            $mainContent.appendChild(salesSection);

            const productsSection = document.createElement('div');
            productsSection.innerHTML = '<div class="section-title" style="margin-top:8px;">📦 المنتجات المتاحة للبيع</div>';
            if(allProds.length === 0) {
                productsSection.innerHTML += '<div class="empty-state"><span class="emoji">🔍</span><div class="msg">لا توجد منتجات مطابقة</div></div>';
            } else {
                allProds.forEach(p => {
                    const card = document.createElement('div'); card.className='card'; card.style.cursor='default';
                    const stockBadge = !p.stock ? '<span class="badge badge-stock-out">نفذ</span>' : (p.stock<=5 ? '<span class="badge badge-stock-low">منخفض</span>' : '<span class="badge badge-stock-good">متوفر</span>');
                    card.innerHTML = `
                        <div class="icon-box product-icon">🏷️</div>
                        <div class="info"><div class="name">${escapeHtml(p.name)}</div><div class="meta"><span>🔢 ${escapeHtml(p.serial)}</span><span>📂 ${escapeHtml(p.type)}</span><span>📦 ${p.stock||0}</span><span>💰 ${(p.price||0).toFixed(2)} ₪</span></div></div>
                        ${stockBadge}
                        <input type="number" class="sale-quantity-input" id="qty_${p.id}" placeholder="0" min="0" max="${p.stock||0}" value="0" style="width:50px;">
                        <input type="number" class="sale-discount-input" id="disc_${p.id}" placeholder="خصم" min="0" step="0.01" value="0" style="width:60px;">
                        <button class="btn btn-success" style="padding:8px 10px;font-size:13px;flex-shrink:0;" data-sell="${p.id}">بيع</button>`;
                    card.addEventListener('click', e => { if(!e.target.closest('button') && !e.target.closest('input')) { const inp=card.querySelector('.sale-quantity-input'); if(inp) inp.focus(); } });
                    productsSection.appendChild(card);
                });
            }
            $mainContent.appendChild(productsSection);

            // إضافة الرسوم البيانية
            drawSalesCharts();

            // ربط أحداث البيع
            document.querySelectorAll('[data-sell]').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const prodId = this.dataset.sell;
                    const qtyInput = document.getElementById('qty_'+prodId);
                    const discInput = document.getElementById('disc_'+prodId);
                    const quantity = parseInt(qtyInput?.value) || 0;
                    const discount = parseFloat(discInput?.value) || 0;
                    if(quantity <= 0) { showToast('⚠️ حدد كمية صالحة'); return; }
                    processSale(prodId, quantity, discount);
                });
            });

            // ربط أزرار حذف المبيعات
            document.querySelectorAll('.btn-delete-sale').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const saleId = this.dataset.saleId;
                    const sale = salesHistory.find(s => s.id === saleId);
                    if(sale) {
                        showConfirm('حذف عملية البيع', `حذف بيع "${sale.productName}" (${sale.quantity} قطعة)؟`, () => {
                            deleteSale(saleId);
                        });
                    }
                });
            });
        }

        function drawSalesCharts() {
            if (salesHistory.length === 0) return;

            // تجهيز بيانات الأنواع
            const typeMap = new Map();
            salesHistory.forEach(sale => {
                const prod = findProductById(sale.productId);
                const type = prod ? prod.product.type : 'غير معروف';
                typeMap.set(type, (typeMap.get(type) || 0) + sale.quantity);
            });

            // تجهيز بيانات الأرباح حسب المنتج
            const profitMap = new Map();
            salesHistory.forEach(sale => {
                profitMap.set(sale.productName, (profitMap.get(sale.productName) || 0) + (sale.totalProfit || 0));
            });

            const chartContainer = document.createElement('div');
            chartContainer.className = 'chart-container';
            chartContainer.style.marginTop = '12px';

            // رسم الدونات للأنواع
            const types = Array.from(typeMap.entries());
            const totalQty = types.reduce((sum, [, q]) => sum + q, 0);
            const colors = ['#0071e3', '#34c759', '#ff9500', '#ff3b30', '#af52de', '#ff2d55', '#5856d6', '#00b0ff'];

            if (types.length > 0) {
                let gradientStops = [];
                let cumulativePercent = 0;
                types.forEach(([, q], i) => {
                    const percent = (q / totalQty) * 100;
                    if (i === 0) gradientStops.push(`${colors[i % colors.length]} ${cumulativePercent}%`);
                    cumulativePercent += percent;
                    gradientStops.push(`${colors[i % colors.length]} ${cumulativePercent}%`);
                });
                const donutStyle = `background: conic-gradient(${gradientStops.join(', ')})`;

                const donutHtml = `
                    <div class="section-title">📊 توزيع المبيعات حسب النوع</div>
                    <div class="donut-chart" style="${donutStyle}">
                        <div class="donut-inner" style="background:white; width:90px; height:90px; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                            ${totalQty} قطعة
                        </div>
                    </div>
                    <div class="legend">
                        ${types.map(([type, q], i) => `
                            <div class="legend-item">
                                <div class="legend-color" style="background:${colors[i % colors.length]}"></div>
                                <span>${escapeHtml(type)} (${q})</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                chartContainer.innerHTML += donutHtml;
            }

            // رسم شارت الأرباح
            const profitEntries = Array.from(profitMap.entries()).sort((a,b) => b[1] - a[1]);
            const maxProfit = profitEntries[0]?.[1] || 1;

            if (profitEntries.length > 0) {
                let profitHtml = '<div class="section-title" style="margin-top:16px;">💰 الأرباح حسب المنتج</div>';
                profitEntries.forEach(([name, profit]) => {
                    const widthPercent = Math.max((profit / maxProfit) * 100, 2);
                    profitHtml += `
                        <div class="profit-bar-item">
                            <div class="profit-bar-label">
                                <span>${escapeHtml(name)}</span>
                                <span>${profit.toFixed(2)} ₪</span>
                            </div>
                            <div class="profit-bar-bg">
                                <div class="profit-bar-fill" style="width:${widthPercent}%"></div>
                            </div>
                        </div>
                    `;
                });
                chartContainer.innerHTML += profitHtml;
            }

            $mainContent.appendChild(chartContainer);
        }

        function deleteSale(saleId) {
            salesHistory = salesHistory.filter(s => s.id !== saleId);
            saveSales(salesHistory);
            showToast('تم حذف عملية البيع');
            renderAll();
        }

        function processSale(prodId, quantity, discount = 0) {
            const found = findProductById(prodId);
            if(!found) { showToast('⚠️ المنتج غير موجود'); return; }
            const {product, shelf, subshelf} = found;
            if((product.stock||0) < quantity) { showToast('⚠️ المخزون غير كافٍ'); return; }
            const unitPrice = product.price||0, unitCost = product.cost||0;
            const originalTotal = unitPrice * quantity;
            const finalDiscount = Math.min(discount, originalTotal);
            const totalPrice = originalTotal - finalDiscount;
            const totalProfit = (unitPrice - unitCost) * quantity - finalDiscount;
            const confirmMsg = `بيع ${quantity} قطعة من "${product.name}"
الإجمالي الأصلي: ${originalTotal.toFixed(2)} ₪
الخصم: ${finalDiscount.toFixed(2)} ₪
الإجمالي النهائي: ${totalPrice.toFixed(2)} ₪
الربح: ${totalProfit.toFixed(2)} ₪`;

            showConfirm('تأكيد البيع', confirmMsg, () => {
                product.stock = (product.stock||0) - quantity;
                const saleRecord = {
                    id: generateId(), productId: prodId, productName: product.name, serial: product.serial,
                    quantity, unitPrice, unitCost, totalPrice, totalProfit,
                    discount: finalDiscount,
                    date: new Date().toISOString(),
                    location: subshelf ? (shelf?.name||'') + ' / ' + subshelf.name : (shelf?.name||'')
                };
                salesHistory.push(saleRecord);
                saveData(shelves); saveSales(salesHistory);
                showToast(`✅ تم البيع! الربح: ${totalProfit.toFixed(2)} ₪`);
                renderAll();
            });
        }

        function createProductCard(p, shelf, subshelf) {
            const card = document.createElement('div'); card.className='card';
            let stockBadge = 'badge-stock-good', stockLabel='متوفر';
            if(!(p.stock||0)) { stockBadge='badge-stock-out'; stockLabel='نفذ'; } else if(p.stock<=5) { stockBadge='badge-stock-low'; stockLabel='منخفض'; }
            const priceStr = (p.price||0) > 0 ? `<span>💰 ${(p.price||0).toFixed(2)} ₪</span>` : '';
            card.innerHTML = `
                <div class="icon-box product-icon">🏷️</div>
                <div class="info"><div class="name">${escapeHtml(p.name)}</div><div class="meta"><span>🔢 ${escapeHtml(p.serial)}</span><span>📂 ${escapeHtml(p.type)}</span>${priceStr}</div></div>
                <span class="badge ${stockBadge}">${stockLabel}: ${p.stock||0}</span>
                <button class="btn-delete" data-action="delete-product" data-id="${p.id}" data-parent="${subshelf?subshelf.id:(shelf?shelf.id:'')}" data-parent-type="${subshelf?'subshelf':'shelf'}">🗑️</button>`;
            card.addEventListener('click', e => { if(!e.target.closest('[data-action]')) openEditProductModal(p, subshelf, shelf); });
            return card;
        }

        function attachDeleteListeners() {
            document.querySelectorAll('[data-action="delete-shelf"]').forEach(b => b.onclick = function(e){ e.stopPropagation();
                const id=this.dataset.id, s=shelves.find(x=>x.id===id);
                showConfirm('حذف الرف', `حذف "${s?.name}"؟`, ()=>{ shelves=shelves.filter(x=>x.id!==id); saveData(shelves); showToast('تم الحذف'); navigateTo('home'); });
            });
            document.querySelectorAll('[data-action="delete-subshelf"]').forEach(b => b.onclick = function(e){ e.stopPropagation();
                const id=this.dataset.id, shelf=getCurrentShelf(), ss=shelf?(shelf.subShelves||[]).find(x=>x.id===id):null;
                showConfirm('حذف الفرعي', `حذف "${ss?.name}"؟`, ()=>{ if(shelf){ shelf.subShelves = (shelf.subShelves||[]).filter(x=>x.id!==id); saveData(shelves); showToast('تم'); renderAll(); } });
            });
            document.querySelectorAll('[data-action="delete-product"]').forEach(b => b.onclick = function(e){ e.stopPropagation();
                const id=this.dataset.id, pType=this.dataset.parentType, pId=this.dataset.parent;
                let name='';
                if(pType==='subshelf'){ const sh=getCurrentShelf(), ss=sh?(sh.subShelves||[]).find(x=>x.id===pId):null; name=ss?(ss.products||[]).find(x=>x.id===id)?.name:''; }
                else { const sh=shelves.find(x=>x.id===pId); name=sh?(sh.products||[]).find(x=>x.id===id)?.name:''; }
                showConfirm('حذف منتج', `حذف "${name}"؟`, ()=>{
                    if(pType==='subshelf'){ const sh=getCurrentShelf(), ss=sh?(sh.subShelves||[]).find(x=>x.id===pId):null; if(ss){ ss.products=(ss.products||[]).filter(x=>x.id!==id); saveData(shelves); } }
                    else { const sh=shelves.find(x=>x.id===pId); if(sh){ sh.products=(sh.products||[]).filter(x=>x.id!==id); saveData(shelves); } }
                    showToast('تم'); renderAll();
                });
            });
        }

        function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
        function getTypeFromSerial(ser) {
            if(!ser) return null; let best=null, bl=0;
            serialMappings.forEach(m => { if(ser.startsWith(m.prefix) && m.prefix.length>bl){ best=m.type; bl=m.prefix.length; } });
            return best;
        }

        function openModal(title, body, primary, onPrimary, cancel='إلغاء', onCancel=null, extra=null) {
            $modalTitle.textContent=title; $modalBody.innerHTML=body;
            let btns = ''; if(extra) btns += `<button class="btn btn-danger" id="modalExtraBtn">${extra.label}</button>`;
            btns += `<button class="btn btn-cancel" id="modalCancelBtn">${cancel}</button><button class="btn btn-primary" id="modalPrimaryBtn">${primary}</button>`;
            $modalBtns.innerHTML=btns; $modalOverlay.classList.add('active');
            const primBtn=document.getElementById('modalPrimaryBtn'), cancBtn=document.getElementById('modalCancelBtn'), extraBtn=document.getElementById('modalExtraBtn');
            const close = () => { $modalOverlay.classList.remove('active'); primBtn?.removeEventListener('click',ph); cancBtn?.removeEventListener('click',ch); extraBtn?.removeEventListener('click',eh); $modalOverlay.removeEventListener('click',oh); };
            const ph = e => { e.stopPropagation(); if(onPrimary) onPrimary(close); };
            const ch = e => { e.stopPropagation(); if(onCancel) onCancel(); close(); };
            const eh = e => { e.stopPropagation(); if(extra?.onClick) extra.onClick(close); };
            const oh = e => { if(e.target===$modalOverlay){ if(onCancel) onCancel(); close(); } };
            primBtn?.addEventListener('click',ph); cancBtn?.addEventListener('click',ch); extraBtn?.addEventListener('click',eh); $modalOverlay.addEventListener('click',oh);
            setTimeout(()=>{ const inp=$modalBody.querySelector('input'); if(inp) inp.focus(); },350);
        }
        function closeModal(){ $modalOverlay.classList.remove('active'); }

        function openAddProductModal() {
            const shelf=getCurrentShelf(), subshelf=getCurrentSubShelf(), loc=subshelf?subshelf.name:(shelf?shelf.name:'');
            openModal('إضافة منتج'+(loc?' إلى '+loc:''),
                `<div class="form-group"><label>الرقم التسلسلي</label><input id="inputSerial"></div>
                 <div class="form-group"><label>اسم المنتج</label><input id="inputName"></div>
                 <div class="form-group"><label>النوع</label><input id="inputType" placeholder="يملأ تلقائياً"></div>
                 <div class="form-group"><label>المخزون</label><input type="number" id="inputStock" value="0" min="0"></div>
                 <div class="form-group"><label>سعر البيع (₪)</label><input type="number" id="inputPrice" value="0" min="0" step="0.01"></div>
                 <div class="form-group"><label>سعر التكلفة (₪)</label><input type="number" id="inputCost" value="0" min="0" step="0.01"></div>`,
                'إضافة', close => {
                    const ser=document.getElementById('inputSerial').value.trim(), name=document.getElementById('inputName').value.trim(), type=document.getElementById('inputType').value.trim();
                    const stock=parseInt(document.getElementById('inputStock').value)||0, price=parseFloat(document.getElementById('inputPrice').value)||0, cost=parseFloat(document.getElementById('inputCost').value)||0;
                    if(!ser||!name||!type){ showToast('املأ الحقول'); return; }
                    const prod = { id:generateId(), serial:ser, name, type, stock, price, cost };
                    if(currentView==='subshelf' && subshelf){ if(!subshelf.products) subshelf.products=[]; subshelf.products.push(prod); }
                    else if(currentView==='shelf' && shelf){ if(!shelf.products) shelf.products=[]; shelf.products.push(prod); }
                    saveData(shelves); close(); showToast('تمت الإضافة'); renderAll();
                });
            setTimeout(()=>{
                const si=document.getElementById('inputSerial'), ti=document.getElementById('inputType');
                if(si&&ti) si.addEventListener('input', ()=>{ const auto=getTypeFromSerial(si.value.trim()); if(auto) ti.value=auto; });
            },100);
        }

        function openEditProductModal(prod, subshelf, shelf) {
            const loc = subshelf?subshelf.name:(shelf?shelf.name:'');
            openModal('تعديل منتج'+(loc?' - '+loc:''),
                `<div class="form-group"><label>السيريال</label><input id="inputSerial" value="${escapeHtml(prod.serial)}"></div>
                 <div class="form-group"><label>الاسم</label><input id="inputName" value="${escapeHtml(prod.name)}"></div>
                 <div class="form-group"><label>النوع</label><input id="inputType" value="${escapeHtml(prod.type)}"></div>
                 <div class="form-group"><label>المخزون</label><input type="number" id="inputStock" value="${prod.stock||0}" min="0"></div>
                 <div class="form-group"><label>سعر البيع</label><input type="number" id="inputPrice" value="${prod.price||0}" min="0" step="0.01"></div>
                 <div class="form-group"><label>سعر التكلفة</label><input type="number" id="inputCost" value="${prod.cost||0}" min="0" step="0.01"></div>`,
                'حفظ', close => {
                    const ser=document.getElementById('inputSerial').value.trim(), name=document.getElementById('inputName').value.trim(), type=document.getElementById('inputType').value.trim();
                    const stock=parseInt(document.getElementById('inputStock').value)||0, price=parseFloat(document.getElementById('inputPrice').value)||0, cost=parseFloat(document.getElementById('inputCost').value)||0;
                    if(!ser||!name||!type){ showToast('الحقول مطلوبة'); return; }
                    prod.serial=ser; prod.name=name; prod.type=type; prod.stock=stock; prod.price=price; prod.cost=cost;
                    saveData(shelves); close(); showToast('تم التحديث'); renderAll();
                }, 'إلغاء', null, {
                    label:'حذف', onClick: close => { close(); showConfirm('حذف',`حذف "${prod.name}"؟`,()=>{
                        if(subshelf) subshelf.products = (subshelf.products||[]).filter(p=>p.id!==prod.id);
                        else if(shelf) shelf.products = (shelf.products||[]).filter(p=>p.id!==prod.id);
                        saveData(shelves); showToast('تم'); renderAll();
                    });}
                });
            setTimeout(()=>{
                const si=document.getElementById('inputSerial'), ti=document.getElementById('inputType');
                if(si&&ti) si.addEventListener('input', ()=>{ const auto=getTypeFromSerial(si.value.trim()); if(auto) ti.value=auto; });
            },100);
        }

        function openBackupModal() {
            openModal('💾 نسخ احتياطي', '<p style="text-align:center;margin-bottom:16px;">تصدير أو استيراد كامل البيانات (تشمل المبيعات)</p>', 'تصدير', close => { exportData(); close(); }, 'إلغاء', null, { label:'استيراد', onClick: close => { close(); $importFile.click(); } });
        }
        function exportData() {
            const backup = { shelves, serialMappings, salesHistory, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'مخزوني_نسخ_احتياطي.json'; a.click();
            showToast('تم التصدير ✓');
        }
        $importFile.addEventListener('change', function() {
            const file = this.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(!data.shelves || !Array.isArray(data.shelves)) throw new Error('تنسيق غير صالح');
                    showConfirm('استيراد البيانات', 'سيتم استبدال جميع البيانات الحالية (تشمل المبيعات). متابعة؟', () => {
                        shelves = data.shelves; serialMappings = data.serialMappings || []; salesHistory = data.salesHistory || [];
                        saveData(shelves); saveMappings(serialMappings); saveSales(salesHistory);
                        showToast('تم الاستيراد بنجاح'); navigateTo('home');
                    });
                } catch(ex) { showToast('ملف غير صالح'); }
            };
            reader.readAsText(file); this.value = '';
        });

        function openMappingsModal() {
            let html = serialMappings.length ? '<ul style="list-style:none;padding:0;margin:0 0 16px;">' : '<p style="text-align:center;color:#8e8e93;">لا قواعد</p>';
            serialMappings.forEach((m,i) => html += `<li style="display:flex;justify-content:space-between;background:#f5f5f7;border-radius:8px;padding:8px 12px;margin-bottom:6px;"><span><strong>${escapeHtml(m.prefix)}</strong> ← ${escapeHtml(m.type)}</span><button class="del-map" data-idx="${i}" style="background:none;border:none;font-size:18px;color:#ff3b30;">🗑️</button></li>`);
            if(serialMappings.length) html += '</ul>';
            html += `<div style="display:flex;gap:8px;align-items:flex-end;"><div class="form-group" style="flex:1;margin:0;"><label>بادئة</label><input id="newPrefix" placeholder="00004"></div><div class="form-group" style="flex:1;margin:0;"><label>النوع</label><input id="newType" placeholder="ذكاء اصطناعي"></div><button id="addMapBtn" style="height:44px;padding:0 16px;border-radius:8px;background:#0071e3;color:#fff;border:none;font-weight:600;">إضافة</button></div>`;
            openModal('⚙️ ربط السيريال', html, 'إغلاق', c=>c());
            document.getElementById('addMapBtn')?.addEventListener('click', ()=>{
                const p=document.getElementById('newPrefix').value.trim(), t=document.getElementById('newType').value.trim();
                if(!p||!t){ showToast('املأ الحقلين'); return; }
                serialMappings.push({prefix:p, type:t}); saveMappings(serialMappings); closeModal(); setTimeout(openMappingsModal,300);
            });
            document.querySelectorAll('.del-map').forEach(b => b.addEventListener('click', function(){
                const i=parseInt(this.dataset.idx); serialMappings.splice(i,1); saveMappings(serialMappings); closeModal(); setTimeout(openMappingsModal,300);
            }));
        }

        function showConfirm(title, sub, cb){ $confirmMsg.textContent=title; $confirmSub.textContent=sub||''; confirmCallback=cb; $confirmOverlay.classList.add('active'); }
        function hideConfirm(){ $confirmOverlay.classList.remove('active'); confirmCallback=null; }

        $btnBack.addEventListener('click', goBack);
        $btnSearch.addEventListener('click', ()=> $searchWrap.classList.toggle('hidden'));
        $searchInput.addEventListener('input', function(){ searchQuery=this.value; renderAll(); });
        $btnSettings.addEventListener('click', openMappingsModal);
        $btnBackup.addEventListener('click', openBackupModal);
        $btnSales.addEventListener('click', ()=> navigateTo('sales'));
        $fab.addEventListener('click', ()=>{
            if(currentView==='home') openModal('إضافة رف', '<div class="form-group"><label>اسم الرف</label><input id="shelfName"></div>', 'إضافة', close=>{
                const n=document.getElementById('shelfName').value.trim(); if(!n){ showToast('ادخل اسماً'); return; }
                shelves.push({id:generateId(), name:n, subShelves:[], products:[]}); saveData(shelves); close(); showToast('تم'); renderAll();
            });
            else if(currentView==='shelf') showFabChoiceShelf();
            else if(currentView==='subshelf') openAddProductModal();
        });
        function showFabChoiceShelf() {
            const shelf=getCurrentShelf(); if(!shelf) return;
            openModal('إضافة إلى '+shelf.name, '<p style="text-align:center;">اختر</p>', '📂 رف فرعي', close=>{ close(); openModal('رف فرعي', '<div class="form-group"><label>الاسم</label><input id="subName"></div>', 'إضافة', c=>{
                const n=document.getElementById('subName').value.trim(); if(!n){ showToast('ادخل اسماً'); return; }
                if(!shelf.subShelves) shelf.subShelves=[]; shelf.subShelves.push({id:generateId(), name:n, products:[]}); saveData(shelves); c(); showToast('تم'); renderAll();
            });}, 'إلغاء', null, {label:'📦 منتج مباشر', onClick:close=>{close(); openAddProductModal();}});
        }
        $confirmOk.addEventListener('click', ()=>{ if(confirmCallback) confirmCallback(); hideConfirm(); });
        $confirmCancel.addEventListener('click', hideConfirm);
        $confirmOverlay.addEventListener('click', e=>{ if(e.target===$confirmOverlay) hideConfirm(); });
        document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ if($confirmOverlay.classList.contains('active')) hideConfirm(); else if($modalOverlay.classList.contains('active')) closeModal(); } });

        function renderAll(){ renderStats(); renderTotalBars(); renderContent(); }
        navigateTo('home');
    })();
</script>
</body>
</html>
